# lazygit config — supercharge the diff view with delta.
#
# delta reads its options (line-numbers, navigate, theme) from the [delta]
# section of the git config regardless of how it's launched, so lazygit's diffs
# match `git diff` on the CLI. Layout is the one thing that varies per entry:
# the side-by-side pager opts into the [delta "sidebyside"] feature defined in
# git/dot-gitconfig; the inline pager omits it (delta has no --side-by-side=false
# flag, and the base [delta] section would override one anyway — hence a feature).
#
# git.pagers is a LIST: lazygit cycles through it with the `cyclePagers` key
# (default `|`) inside the diff view. So `|` toggles side-by-side <-> inline.
# Entry 0 (side-by-side) is the default shown first.
#
# The `command -v delta` guard mirrors ~/.gitconfig's pager: use delta when it's
# on PATH, otherwise fall back to less. lazygit runs the pager through a shell,
# so this degrades gracefully on a machine where the delta binary isn't present.
git:
  pagers:
    # 0 — side-by-side (default)
    - colorArg: always
      pager: "if command -v delta >/dev/null 2>&1; then delta --paging=never --features sidebyside; else less -FRX; fi"
    # 1 — inline / unified  (press `|` in the diff view to toggle)
    - colorArg: always
      pager: "if command -v delta >/dev/null 2>&1; then delta --paging=never; else less -FRX; fi"
